<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FORGE SHOP</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/nav.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/products.css">
  <link rel="stylesheet" href="styles/cart.css">
  <link rel="stylesheet" href="styles/utils.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="logo">FORGE<span>.</span></a>
    <ul class="nav-links">
      <li><a href="index.html" class="active">Shop</a></li>
      <li><a href="#fitness">Fitness</a></li>
      <li><a href="#technik">Technik</a></li>
      <li><a href="#angebote">Angebote</a></li>
    </ul>
    <div class="nav-actions">
      <div class="search-bar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Suchen…">
      </div>
      <a href="profile.html" class="nav-btn" title="Profil">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      </a>
      <button class="nav-btn js-cart" >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span class="cart-count" id="cartCount">0</span>
      </button>
    </div>
  </div>
</nav>

<section class="hero">
  <div class="hero-inner">
    <div class="hero-label">Neu eingetroffen — 2025</div>
    <h1>
      GEAR UP.<br>
      <em>PERFORM</em><br>
      <span class="outline">BETTER.</span>
    </h1>
    <p class="hero-sub">Premium Ausrüstung für Fitness-Enthusiasten und Techniker. Keine Kompromisse.</p>
  </div>
</section>

<div class="shop-layout">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">Kategorie</div>
      <button class="filter-btn active" >Alle Produkte</button>
      <button class="filter-btn" >Fitness</button>
      <button class="filter-btn" >Technik</button>
      
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">Max. Preis</div>
      <div class="price-range">
        <input type="range" id="priceRange" min="0" max="500" value="500" step="10">
        <div class="price-labels">
          <span>0€</span>
          <span id="priceVal">500€</span>
        </div>
      </div>
    </div>
  </aside>

  <main>
    <div class="products-header">
      <span class="products-count"> Produkte</span>
      <select class="sort-select">
        <option value="default">Sortieren</option>
        <option value="price-asc">Preis ↑</option>
        <option value="price-desc">Preis ↓</option>
        <option value="name">Name A–Z</option>
      </select>
    </div>
    <div class="products-grid" >
      
    </div>
   
  </main>
</div>

<div class="cart">
  
</div>


<footer>
  <p>© 2025 <strong>FORGE SHOP</strong> — Fitness &amp; Technik</p>
</footer>

<script src="js/data.js"></script>
<script src="js/cart.js"></script>
<script src="js/shop.js"></script>
</body>
</html>
